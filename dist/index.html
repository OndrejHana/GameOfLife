<!DOCTYPE html>
<html>
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="ui">
      <label for="rozliseni_mapy">rozliseni</label>
      <input type="number" id="rozliseni_mapy" />
      <button class="btn btn-primary" id="vytvor_mapu_button">vytvor mapu</button>
      <button class="btn" id="submit_button" style="visibility:hidden" >Start</button>
    </div>
    <div class="hra">
      <div id="mapa_div">
        <table id="mapa"></table>
      </div>
      <div class="statistiky"></div>
    </div>
    <script src="main.js" type="module"></script>
  </body>
</html>

  body {
    margin: 0;
    padding: 0;
  }
  .ui {
    border: solid black 1px;
    width: 800px;
    height: 100px;
    margin: 0;
    padding: 0;
  }
  .hra {
    display: flex;
    margin: 0;
    padding: 0;
  }

  #mapa_div {
    margin: 0;
    width: 500px;
    height: 500px;
    border: solid black 1px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .statistiky {
    margin: 0;
    width: 300px;
    height: 500px;
    border: solid black 1px;
  }

  #mapa {
    border: solid black 1px;
    width: 90%;
    height: 90%;
  }
  .mapa_policko {
    border: solid grey 1px;
  }

  .mrtve_policko {
    background-color: white;
  }
  .zive_policko {
